server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Defer upstream DNS resolution to request time so nginx starts even when
    # the "server" hostname isn't resolvable yet (compose network) or doesn't
    # exist at all (ECS — ALB does path routing for /api/*, so nginx never
    # actually serves a /api/* request in that environment).
    resolver 127.0.0.11 ipv6=off valid=10s;

    location /api/ {
        set $upstream_backend "server";
        proxy_pass http://$upstream_backend:5001$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — serve index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache the entry HTML
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
