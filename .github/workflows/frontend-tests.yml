name: Frontend Tests

on:
  # Triggers disabled — superseded by tests.yml. Manual runs still allowed.
  workflow_dispatch:

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: shopsmart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: "mysql://root:rootpw@localhost:3306/shopsmart"
      JWT_SECRET: "ci-test-secret"
      PORT: "5001"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # Server setup (needed so playwright can boot the API in webServer)
      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Apply Prisma Migrations
        working-directory: ./server
        run: npx prisma migrate deploy

      - name: Seed Database
        working-directory: ./server
        run: npx prisma db seed

      # Client setup
      - name: Install Client Dependencies
        working-directory: ./client
        run: npm install

      - name: Lint
        working-directory: ./client
        run: npm run lint

      - name: Format Check
        working-directory: ./client
        run: npm run format:check

      - name: Run Tests (Vitest)
        working-directory: ./client
        run: npm test

      - name: Build
        working-directory: ./client
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: ./client
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests (Playwright)
        working-directory: ./client
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
