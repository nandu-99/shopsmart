name: Pipeline

# Rubric workflow order:
#   Push → Run Tests → Terraform Apply → Docker Build & Push → Deploy to ECS
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. TEST — fast smoke (full suite still runs in tests.yml)
  # ─────────────────────────────────────────────────────────────
  test:
    name: 1 · Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: shopsmart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: "mysql://root:rootpw@localhost:3306/shopsmart"
      JWT_SECRET: "ci-pipeline-secret"
      PORT: "5001"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install backend
        working-directory: ./server
        run: npm install

      - name: Apply migrations
        working-directory: ./server
        run: npx prisma migrate deploy

      - name: Run backend tests
        working-directory: ./server
        run: npm run test:ci

      - name: Install frontend
        working-directory: ./client
        run: npm install

      - name: Run frontend tests
        working-directory: ./client
        run: npm run test:ci

  # ─────────────────────────────────────────────────────────────
  # 2. TERRAFORM — provision / converge AWS infra
  # ─────────────────────────────────────────────────────────────
  terraform:
    name: 2 · Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./infra

    outputs:
      ecr_backend: ${{ steps.tf_outputs.outputs.ecr_backend }}
      ecr_client: ${{ steps.tf_outputs.outputs.ecr_client }}
      cluster: ${{ steps.tf_outputs.outputs.cluster }}
      backend_svc: ${{ steps.tf_outputs.outputs.backend_svc }}
      client_svc: ${{ steps.tf_outputs.outputs.client_svc }}
      alb: ${{ steps.tf_outputs.outputs.alb }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x

      - name: terraform init
        run: terraform init -input=false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture outputs for downstream jobs
        id: tf_outputs
        run: |
          echo "ecr_backend=$(terraform output -raw ecr_backend_repo)" >> "$GITHUB_OUTPUT"
          echo "ecr_client=$(terraform output -raw ecr_client_repo)"   >> "$GITHUB_OUTPUT"
          echo "cluster=$(terraform output -raw ecs_cluster)"          >> "$GITHUB_OUTPUT"
          echo "backend_svc=$(terraform output -raw ecs_backend_service)" >> "$GITHUB_OUTPUT"
          echo "client_svc=$(terraform output -raw ecs_client_service)"   >> "$GITHUB_OUTPUT"
          echo "alb=$(terraform output -raw alb_dns_name)"             >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────
  # 3. BUILD & PUSH — docker buildx → ECR
  # ─────────────────────────────────────────────────────────────
  build_push:
    name: 3 · Docker Build & Push
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.terraform.outputs.ecr_backend }}:latest
            ${{ needs.terraform.outputs.ecr_backend }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.terraform.outputs.ecr_client }}:latest
            ${{ needs.terraform.outputs.ecr_client }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # 4. DEPLOY — force ECS to pull the new images
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 4 · Deploy to ECS
    runs-on: ubuntu-latest
    needs: [terraform, build_push]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment (backend + client)
        run: |
          aws ecs update-service \
            --cluster ${{ needs.terraform.outputs.cluster }} \
            --service ${{ needs.terraform.outputs.backend_svc }} \
            --force-new-deployment >/dev/null
          aws ecs update-service \
            --cluster ${{ needs.terraform.outputs.cluster }} \
            --service ${{ needs.terraform.outputs.client_svc }} \
            --force-new-deployment >/dev/null

      - name: Wait for services to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ needs.terraform.outputs.cluster }} \
            --services ${{ needs.terraform.outputs.backend_svc }} ${{ needs.terraform.outputs.client_svc }}

  # ─────────────────────────────────────────────────────────────
  # 5. SMOKE TEST — verify the deployment is alive
  # ─────────────────────────────────────────────────────────────
  smoke:
    name: 5 · Smoke Test
    runs-on: ubuntu-latest
    needs: [terraform, deploy]

    steps:
      - name: GET /api/health expects 200
        run: |
          set -e
          STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            http://${{ needs.terraform.outputs.alb }}/api/health)
          cat /tmp/health.json && echo
          [ "$STATUS" = "200" ] || (echo "Health check returned $STATUS" && exit 1)

      - name: GET / returns SHOPSMART HTML
        run: |
          set -e
          STATUS=$(curl -s -o /tmp/root.html -w "%{http_code}" \
            http://${{ needs.terraform.outputs.alb }}/)
          [ "$STATUS" = "200" ] || (echo "Root returned $STATUS" && exit 1)
          grep -q "ShopSmart" /tmp/root.html || (echo "HTML missing ShopSmart" && exit 1)

      - name: Print live URL
        run: |
          echo "🟢 Deployment live at:"
          echo "    http://${{ needs.terraform.outputs.alb }}"
