name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (unit + integration + coverage)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: shopsmart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: "mysql://root:rootpw@localhost:3306/shopsmart"
      JWT_SECRET: "ci-test-secret"
      PORT: "5001"

    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Run tests with coverage + JUnit
        run: npm run test:ci

      - name: Upload backend JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          path: server/test-results/junit.xml
          retention-days: 7

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/
          retention-days: 7

  frontend:
    name: Frontend (vitest + coverage + e2e)
    runs-on: ubuntu-latest
    needs: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: shopsmart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: "mysql://root:rootpw@localhost:3306/shopsmart"
      JWT_SECRET: "ci-test-secret"
      PORT: "5001"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Apply Prisma migrations
        working-directory: ./server
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: ./server
        run: npx prisma db seed

      - name: Install client dependencies
        working-directory: ./client
        run: npm install

      - name: Lint
        working-directory: ./client
        run: npm run lint

      - name: Format Check
        working-directory: ./client
        run: npm run format:check

      - name: Run vitest with coverage + JUnit
        working-directory: ./client
        run: npm run test:ci

      - name: Upload frontend JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-junit
          path: client/test-results/junit.xml
          retention-days: 7

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client/coverage/
          retention-days: 7

      - name: Build client
        working-directory: ./client
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ./client
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: ./client
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
